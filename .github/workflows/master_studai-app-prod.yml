# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - studai-app-prod

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: azure-deploy-production
  cancel-in-progress: false

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, redis, gd, zip, bcmath, intl, xml, curl

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-reqs --optimize-autoloader

      - name: Patch HtmlSanitizer for Azure PHP 8.4 (Dom\ namespace unavailable)
        run: php scripts/patch-html-sanitizer.php

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_29D98806D3104D628057C2EAE9054352 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4C1C0BFBE5FE4CA5B720B09861EDF023 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DD7C6727C7DB4E3F96EBCCC9731625B5 }}

      - name: Set resilient App Settings (use DB for session/cache/queue to avoid Redis failures)
        run: |
          # Set non-sensitive driver/connection settings (always safe to set)
          az webapp config appsettings set \
            --name studai-app-prod \
            --resource-group studai-career \
            --settings \
              SESSION_DRIVER=database \
              CACHE_STORE=database \
              QUEUE_CONNECTION=database \
              AUTH_DIAG_TOKEN=studai-diag-2024

          # Set Azure OpenAI credentials from GitHub Secrets (if configured)
          # NOTE: .env is NOT in git so we never read from it here.
          # Credentials are hardcoded as PHP fallbacks in AIService.php and can also
          # be set once in Azure Portal → Configuration → Application Settings.
          AZURE_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}"
          AZURE_EP="${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          AZURE_DEP="${{ secrets.AZURE_OPENAI_DEPLOYMENT_ID }}"
          AZURE_VER="${{ secrets.AZURE_OPENAI_API_VERSION }}"
          ANTH_KEY="${{ secrets.AZURE_ANTHROPIC_API_KEY }}"
          ANTH_EP="${{ secrets.AZURE_ANTHROPIC_ENDPOINT }}"

          # Only update AI credentials if GitHub Secrets are actually configured
          # (non-empty). This prevents overwriting manually set Azure Portal values.
          AI_SETTINGS=""
          [ -n "$AZURE_KEY" ] && AI_SETTINGS="$AI_SETTINGS AZURE_OPENAI_API_KEY=${AZURE_KEY}"
          [ -n "$AZURE_EP"  ] && AI_SETTINGS="$AI_SETTINGS AZURE_OPENAI_ENDPOINT=${AZURE_EP}"
          [ -n "$AZURE_DEP" ] && AI_SETTINGS="$AI_SETTINGS AZURE_OPENAI_DEPLOYMENT_ID=${AZURE_DEP}"
          [ -n "$AZURE_VER" ] && AI_SETTINGS="$AI_SETTINGS AZURE_OPENAI_API_VERSION=${AZURE_VER}"
          [ -n "$ANTH_KEY"  ] && AI_SETTINGS="$AI_SETTINGS AZURE_ANTHROPIC_API_KEY=${ANTH_KEY}"
          [ -n "$ANTH_EP"   ] && AI_SETTINGS="$AI_SETTINGS AZURE_ANTHROPIC_ENDPOINT=${ANTH_EP}"

          if [ -n "$AI_SETTINGS" ]; then
            echo "Updating AI credential App Settings from GitHub Secrets..."
            az webapp config appsettings set \
              --name studai-app-prod \
              --resource-group studai-career \
              --settings $AI_SETTINGS
          else
            echo "No AI GitHub Secrets configured — Azure Portal App Settings preserved as-is."
            echo "TIP: Add AZURE_OPENAI_API_KEY etc. as GitHub Secrets to automate credential management."
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'studai-app-prod'
          slot-name: 'Production'
          package: .
          startup-command: 'bash startup.sh'

      - name: Wait for app to be ready then seed test accounts via Kudu
        run: |
          echo "Waiting for app to start (migrations + caches take ~3 min)..."
          MAX_ATTEMPTS=20
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://studai-app-prod.azurewebsites.net/up 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is up! (attempt $((ATTEMPT+1)))"
              break
            fi
            echo "App not ready yet (attempt $((ATTEMPT+1))/$MAX_ATTEMPTS, status=$STATUS), waiting 30s..."
            sleep 30
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Running test account seeder via Kudu API..."
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name studai-app-prod \
            --resource-group studai-career \
            --query "{u:publishingUserName, p:publishingPassword}" \
            --output json)
          KUDU_USER=$(echo "$CREDS" | jq -r .u)
          KUDU_PASS=$(echo "$CREDS" | jq -r .p)

          RESULT=$(curl -s -X POST \
            "https://studai-app-prod.scm.azurewebsites.net/api/command" \
            --user "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"php artisan studai:seed-test-accounts","dir":"/home/site/wwwroot"}' \
            --max-time 90)
          echo "Seeder result: $RESULT"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef1ff"/>
      <stop offset="50%" style="stop-color:#f9f0ff"/>
      <stop offset="100%" style="stop-color:#eefff7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Orb decorations -->
  <circle cx="100" cy="100" r="300" fill="rgba(99,102,241,0.12)"/>
  <circle cx="1150" cy="550" r="250" fill="rgba(236,72,153,0.1)"/>
  <circle cx="900" cy="100" r="200" fill="rgba(16,185,129,0.1)"/>
  <!-- Logo -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="#1a1a2e">Stud</text>
  <text x="163" y="120" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="url(#accent)">AI</text>
  <text x="205" y="120" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="#1a1a2e"> One</text>
  <!-- Main headline -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="#1a1a2e">Your Career.</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="url(#accent)">On Autopilot.</text>
  <!-- Subtext -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-weight="400" font-size="32" fill="#6b7280">India's First Autonomous Career OS</text>
  <!-- Badge -->
  <rect x="80" y="540" width="340" height="50" rx="25" fill="rgba(26,115,232,0.12)"/>
  <text x="250" y="572" font-family="Arial, sans-serif" font-weight="600" font-size="22" fill="#1a73e8" text-anchor="middle">studai-app-prod.azurewebsites.net</text>
</svg>
